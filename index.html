<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haha23435's funny world</title>
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #1e102f 50%, #2e0854 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(168, 85, 247, 0.15);
            --text-main: #f3e8ff;
            --text-muted: #c084fc;
            --text-body: #e9d5ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .navbar {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .layout-container {
            display: grid;
            grid-template-columns: 480px 1fr;
            width: 100%;
            max-width: 1100px;
            padding: 0 20px 40px 20px;
            gap: 30px;
            box-sizing: border-box;
            align-items: flex-start;
        }

        .project-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 20px;
        }

        .frame-wrapper {
            width: 480px;
            height: 360px;
            background-color: #000000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 3px solid var(--primary);
        }

        .frame-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            pointer-events: auto; 
        }

        .game-status-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 15px var(--primary-glow);
            border-bottom: 2px solid rgba(168, 85, 247, 0.2);
            padding-bottom: 15px;
        }

        h2 {
            color: var(--text-muted);
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p {
            color: var(--text-body);
            line-height: 1.6;
            margin-top: 0;
        }

        ul {
            padding-left: 20px;
            margin: 0;
        }

        li {
            color: var(--text-body);
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .changelog-tag {
            background: rgba(168, 85, 247, 0.2);
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 8px;
        }

        @media (max-width: 900px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
            .project-column {
                position: relative;
                top: 0;
                align-items: center;
                width: 100%;
            }
            .frame-wrapper {
                width: 100%;
                max-width: 480px;
                height: 360px;
            }
            .game-status-card {
                width: 100%;
                max-width: 440px;
                box-sizing: border-box;
            }
        }

        @media (max-width: 520px) {
            .frame-wrapper {
                height: 280px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">haha23435's funny world</div>
        <nav class="nav-links">
            <a href="#" class="nav-btn">Home</a>
            <a href="https://github.com/haha23435/" target="_blank" class="nav-btn">GitHub Profile</a>
        </nav>
    </header>

    <div class="layout-container">
        
        <section class="project-column">
            <div class="frame-wrapper">
                <iframe src="project.html" allowtransparency="true" scrolling="no"></iframe>
            </div>
            
            <div class="game-status-card">
                <span>This week's Project i made!</span>
                <span style="color: var(--text-muted); font-size: 0.9rem;"></span>
            </div>
        </section>

        <main class="info-wrapper">
            
            <article class="info-card">
                <h1>haha23435 world 2026</h1>
                <h2>Welcome to my GitHub Website!1!1!1!1111</h2>
            </article>

        </main>

    </div>

</body>
</html>
