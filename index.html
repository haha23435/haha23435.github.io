<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haha23435 world</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 50%, #4c1d95 100%);
            color: #f3e8ff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .layout-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1050px;
            margin: 20px;
            gap: 30px;
            align-items: flex-start;
        }

        .project-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .frame-wrapper {
            width: 480px;
            height: 360px;
            background-color: #000000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #a855f7;
        }

        .frame-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            pointer-events: none;
        }

        .info-column {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            color: #f3e8ff;
            text-shadow: 0 2px 10px rgba(168, 85, 247, 0.4);
            border-bottom: 2px solid rgba(168, 85, 247, 0.3);
            padding-bottom: 10px;
        }

        h2 {
            color: #c084fc;
            font-size: 1.3rem;
            margin-top: 24px;
        }

        p, li {
            color: #e9d5ff;
            line-height: 1.6;
        }

        ul {
            padding-left: 20px;
        }

        @media (max-width: 850px) {
            .layout-container {
                flex-direction: column;
                align-items: center;
            }
            .info-column {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="layout-container">
        

        <div class="project-column">
            <div class="frame-wrapper">
                <iframe src="project.html" allowtransparency="true" scrolling="no"></iframe>
            </div>
        </div>

        <main class="info-column">
            <h1>haha23435 world 2026</h1>
            
            <h2>Welcome to my github website!1!1!1!1111</h2>
            <p>you can have fun here i guess.</p>
            
            <h2>my games</h2>
            <p>⬅️ hey look over here!</p>
        </main>

    </div>

</body>
</html>
